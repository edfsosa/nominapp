name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy via Webhook
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show commits being deployed
        run: |
          PREV_SHA=${{ github.event.before }}
          CURR_SHA=${{ github.sha }}
          echo "=== Commits in this deploy ==="
          git log --oneline "${PREV_SHA}..${CURR_SHA}" 2>/dev/null || git log --oneline -10
          echo "=============================="

      - name: Trigger deploy webhook
        run: |
          HTTP_STATUS=$(curl -s -o /tmp/deploy_out.json -w "%{http_code}" \
            --max-time 300 \
            -X POST \
            -H "X-Deploy-Token: ${{ secrets.DEPLOY_TOKEN }}" \
            -H "Content-Type: text/plain" \
            -d '' \
            https://nominapp.sedacosmetica.com/deploy.php)

          # Print the deploy log from the server response
          echo "=== Deploy log ==="
          cat /tmp/deploy_out.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('log','(no log)'))" 2>/dev/null || cat /tmp/deploy_out.json
          echo "=================="

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "Deploy failed — HTTP $HTTP_STATUS"
            exit 1
          fi

          echo "Deploy successful!"

      - name: Health check
        run: |
          echo "Waiting 10s for app to warm up..."
          sleep 10

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 30 \
            https://nominapp.sedacosmetica.com/admin/login)

          echo "Health check status: $HTTP_STATUS"

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "Health check failed — app returned HTTP $HTTP_STATUS"
            exit 1
          fi

          echo "App is up and responding correctly."
