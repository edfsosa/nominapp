name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Instancia a la que desplegar'
        type: choice
        options: [bar777, arca]
        required: true

jobs:
  deploy:
    uses: nextup-py/deploy-actions/.github/workflows/laravel-deploy.yml@4b7f6f9906881625b777123742dd7b2cc27d464a
    with:
      environment_name: ${{ inputs.environment }}
      run_tests: true
      run_migrations: true
    secrets: inherit
